<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş — nbooking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav id="nav"></nav>
<div id="error-box" class="error" style="display:none"></div>

<h1>Business Girişi</h1>
<form id="business-login-form" class="inline-form">
    <label>Email
        <input type="email" name="email" required>
    </label>
    <label>Şifre
        <input type="password" name="password" required>
    </label>
    <button type="submit">Giriş Yap</button>
</form>

<h1>Business Kaydı</h1>
<form id="business-register-form" class="inline-form">
    <label>İşletme Adı
        <input type="text" name="businessName" required>
    </label>
    <label>Tür
        <select name="businessType" required>
            <option value="BARBER">BARBER</option>
            <option value="RESTAURANT">RESTAURANT</option>
            <option value="HOTEL">HOTEL</option>
        </select>
    </label>
    <label>Email
        <input type="email" name="email" required>
    </label>
    <label>Şifre
        <input type="password" name="password" required>
    </label>
    <label>Adres (opsiyonel)
        <input type="text" name="address">
    </label>
    <label>Telefon (opsiyonel)
        <input type="text" name="phone">
    </label>
    <button type="submit">Kaydol</button>
</form>

<h1>Customer Girişi</h1>
<form id="customer-login-form" class="inline-form">
    <label>Email
        <input type="email" name="email" required>
    </label>
    <label>Şifre
        <input type="password" name="password" required>
    </label>
    <button type="submit">Giriş Yap</button>
</form>

<p>Hesabınız yok mu? <a href="/customers.html">Misafir müşteri olarak kayıt olun</a>.</p>

<script src="/js/app.js"></script>
<script src="/js/index.js"></script>
</body>
</html>
