<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Reservations — nbooking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav id="nav"></nav>
<div id="error-box" class="error" style="display:none"></div>

<p><a href="#" id="back-link">&larr; Geri dön</a></p>
<h1>Reservations <span id="resource-id-label"></span></h1>

<table id="reservations-table">
    <thead>
    <tr>
        <th>ID</th>
        <th>Customer ID</th>
        <th>Başlangıç</th>
        <th>Bitiş</th>
        <th>Durum</th>
        <th>Not</th>
        <th></th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<h2>Yeni Rezervasyon Oluştur</h2>
<form id="create-reservation-form" class="inline-form">
    <label>Customer ID
        <input type="number" name="customerId" required>
    </label>
    <label>Başlangıç
        <input type="datetime-local" name="startTime" required>
    </label>
    <label>Bitiş
        <input type="datetime-local" name="endTime" required>
    </label>
    <label>Not (opsiyonel)
        <input type="text" name="note">
    </label>
    <button type="submit">Oluştur</button>
</form>

<script src="/js/app.js"></script>
<script src="/js/reservations.js"></script>
</body>
</html>
